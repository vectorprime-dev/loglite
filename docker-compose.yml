services:
  postgres:
    image: postgres:16-alpine
    container_name: loglite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loglite}
      POSTGRES_USER: ${POSTGRES_USER:-loglite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loglite}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - loglite-postgres-data:/var/lib/postgresql/data

volumes:
  loglite-postgres-data:

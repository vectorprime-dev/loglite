spring.application.name=loglite-server
server.port=8080

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:loglite}
spring.datasource.username=${POSTGRES_USER:loglite}
spring.datasource.password=${POSTGRES_PASSWORD:loglite}

# Dev-only convenience until Flyway/Liquibase migrations are introduced.
spring.jpa.hibernate.ddl-auto=update
